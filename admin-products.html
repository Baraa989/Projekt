<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration: Lista produkter | Freaky Fashion</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="admin-layout">
    <header class="admin-header">
        <h1>Administration</h1>
    </header>
    
    <div class="admin-main">
        <aside class="admin-sidebar">
            <ul>
                <li><a href="/admin/products" style="text-decoration: underline;">Produkter</a></li>
                <li><a href="/admin/categories">Kategorier</a></li>
            </ul>
        </aside>
        
        <main class="admin-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Produkter</h2>
                <a href="/admin/products/new" class="btn-primary">Ny produkt</a>
            </div>
            
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background-color: #ddd; text-align: left;">
                        <th style="padding: 10px; border: 1px solid #ccc;">Namn</th>
                        <th style="padding: 10px; border: 1px solid #ccc;">SKU</th>
                        <th style="padding: 10px; border: 1px solid #ccc;">Pris</th>
                    </tr>
                </thead>
                <tbody id="product-list">
                    <!-- Data loaded via JS -->
                </tbody>
            </table>
        </main>
    </div>

    <script>
        fetch('/api/admin/products')
            .then(res => res.json())
            .then(products => {
                const tbody = document.getElementById('product-list');
                tbody.innerHTML = products.map(p => `
                    <tr>
                        <td style="padding: 10px; border: 1px solid #ccc;">${p.name}</td>
                        <td style="padding: 10px; border: 1px solid #ccc;">${p.sku || '-'}</td>
                        <td style="padding: 10px; border: 1px solid #ccc;">${p.price}</td>
                    </tr>
                `).join('');
            });
    </script>
</body>
</html>
