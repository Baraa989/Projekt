<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kassa | Freaky Fashion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <header class="site-header">
        <div class="container header-container">
            <div class="logo">
                <a href="index.html"><img
                        src="https://docs.pingidentity.com/connectors/_images/connector-logos/google-hires-logo.png"
                        alt="Freaky Fashion" class="logo-img"></a>
            </div>
        </div>
    </header>

    <main class="container checkout-container">
        <h1>Kassa</h1>
        <div class="checkout-grid">
            <section class="checkout-form">
                <h2>Kontaktinformation</h2>
                <form id="checkout-form">
                    <div class="form-group">
                        <label for="email">E-postadress</label>
                        <input type="email" id="email" required>
                    </div>

                    <h2>Leveransadress</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstname">Förnamn</label>
                            <input type="text" id="firstname" required>
                        </div>
                        <div class="form-group">
                            <label for="lastname">Efternamn</label>
                            <input type="text" id="lastname" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="address">Adress</label>
                        <input type="text" id="address" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="zip">Postnummer</label>
                            <input type="text" id="zip" required>
                        </div>
                        <div class="form-group">
                            <label for="city">Ort</label>
                            <input type="text" id="city" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="margin-top: 20px; width: 100%;">Slutför köp</button>
                </form>
            </section>

            <aside class="order-summary">
                <h2>Din order</h2>
                <div class="summary-items">
                    <p>Produkterna visas här vid en riktig kassa.</p>
                </div>
                <hr>
                <div class="summary-total">
                    <span>Totalt</span>
                    <span>0 SEK</span>
                </div>
            </aside>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-bottom">
            &copy; Freaky Fashion
        </div>
    </footer>
</body>

</html>
